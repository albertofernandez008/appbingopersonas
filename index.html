<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0f0f13"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="People Bingo"/>
  <link rel="manifest" href="./manifest.json"/>
  <title>People Bingo</title>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update }
      from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
    import { getStorage, ref as sRef, uploadString, getDownloadURL }
      from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

    // ─── ⚠️ PEGA AQUÍ TU CONFIG DE FIREBASE ───────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyCxL5Y8sXxHGIBE2jNnusS0Mg6WX0ZehM8",
      authDomain: "people-bingo-56b87.firebaseapp.com",
      databaseURL: "https://people-bingo-56b87-default-rtdb.firebaseio.com",
      projectId: "people-bingo-56b87",
      storageBucket: "people-bingo-56b87.firebasestorage.app",
      messagingSenderId: "182060546158",
      appId: "1:182060546158:web:4ce78e3b877aeba5e4ce7f",
      measurementId: "G-WRRB1NBSZD"
    };
    // ───────────────────────────────────────────────────────────────────────

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    const storage = getStorage(app);

    window._fb = { db, storage, ref, set, get, onValue, update, sRef, uploadString, getDownloadURL };
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap');

    :root {
      --bg:#0f0f13; --surface:#18181f; --surface2:#22222c; --border:#2e2e3a;
      --accent:#c8f04a; --accent2:#7c6dfa; --red:#ff6b6b;
      --text:#f0f0f5; --muted:#6b6b80; --r:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overscroll-behavior:none;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100dvh;}

    /* ── SCREENS ── */
    .screen{display:none;flex-direction:column;height:100dvh;}
    .screen.active{display:flex;}

    /* ── SETUP SCREEN ── */
    #screen-setup{align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:0;}
    .setup-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:6px;}
    .setup-logo span{color:var(--accent);}
    .setup-sub{color:var(--muted);font-size:14px;margin-bottom:40px;}
    .setup-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;text-align:left;}
    .setup-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
    .setup-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;padding:13px 14px;outline:none;transition:border-color .15s;margin-bottom:16px;}
    .setup-input:focus{border-color:var(--accent2);}
    .setup-input::placeholder{color:var(--muted);}
    .divider{display:flex;align-items:center;gap:12px;margin:4px 0 20px;color:var(--muted);font-size:12px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;}
    .btn:active{transform:scale(.97);}
    .btn-primary{background:var(--accent);color:#0f0f13;}
    .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);margin-top:10px;}
    .btn-danger{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.2);}
    .btn:disabled{opacity:.4;pointer-events:none;}

    /* ── GAME SCREEN ── */
    #screen-game{overflow:hidden;}
    header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .hdr-left{display:flex;flex-direction:column;gap:2px;}
    .hdr-room{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
    .hdr-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}
    .scores{display:flex;gap:8px;}
    .score-chip{font-family:'DM Mono',monospace;font-size:12px;padding:5px 10px;border-radius:16px;border:1px solid var(--border);display:flex;align-items:center;gap:5px;}
    .score-chip.me{background:rgba(200,240,74,.1);border-color:rgba(200,240,74,.25);color:var(--accent);}
    .score-chip.them{background:var(--surface);color:var(--muted);}
    .score-chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

    /* tabs */
    .tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
    .tab{flex:1;padding:11px;font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;-webkit-tap-highlight-color:transparent;}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent);}

    /* panels */
    .panel{display:none;overflow-y:auto;flex:1;padding-bottom:20px;}
    .panel.active{display:block;}

    /* progress bar */
    .prog-wrap{padding:14px 16px 4px;}
    .prog-labels{display:flex;justify-content:space-between;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:6px;}
    .prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:14px;}
    .prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}

    /* grid */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 24px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s;position:relative;-webkit-tap-highlight-color:transparent;}
    .card:active{transform:scale(.97);}
    .card.found{border-color:rgba(200,240,74,.4);}
    .card.found-them{border-color:rgba(124,109,250,.4);}
    .card-photo{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
    .card-placeholder{width:100%;aspect-ratio:3/4;background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
    .card-placeholder .em{font-size:30px;opacity:.35;}
    .card-placeholder .lbl{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;}
    .card-num{position:absolute;top:7px;left:7px;font-family:'DM Mono',monospace;font-size:9px;background:rgba(15,15,19,.85);backdrop-filter:blur(4px);color:var(--muted);padding:3px 6px;border-radius:5px;}
    .card.found .card-num{color:var(--accent);}
    .card.found-them .card-num{color:var(--accent2);}
    .found-badge{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;}
    .found-badge.me{background:var(--accent);color:#0f0f13;}
    .found-badge.them{background:var(--accent2);}
    .card-info{padding:9px 11px 11px;}
    .card-title{font-size:11px;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .card-date{margin-top:5px;font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;}

    /* list */
    .list{padding:8px 14px 24px;display:flex;flex-direction:column;gap:8px;}
    .list-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .15s;}
    .list-item.found{border-left:3px solid var(--accent);}
    .list-item.found-them{border-left:3px solid var(--accent2);}
    .list-rank{font-family:'DM Mono',monospace;font-size:18px;color:var(--muted);min-width:26px;}
    .list-item.found .list-rank{color:var(--accent);}
    .list-item.found-them .list-rank{color:var(--accent2);}
    .list-thumb{width:40px;height:40px;border-radius:8px;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;}
    .list-thumb img{width:100%;height:100%;object-fit:cover;}
    .list-info{flex:1;min-width:0;}
    .list-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .list-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
    .list-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
    .list-item.found .list-check{background:var(--accent);border-color:var(--accent);color:#0f0f13;}
    .list-item.found-them .list-check{background:var(--accent2);border-color:var(--accent2);}

    /* modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
    .overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--surface);border-top-left-radius:24px;border-top-right-radius:24px;width:100%;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:max(24px,env(safe-area-inset-bottom));}
    .overlay.open .modal{transform:translateY(0);}
    .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 18px;}
    .modal-photo{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
    .modal-photo-empty{width:100%;aspect-ratio:4/3;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:60px;opacity:.25;}
    .modal-body{padding:18px 20px 10px;}
    .modal-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
    .modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1.3;margin-bottom:14px;}
    .status-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
    .status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'DM Mono',monospace;padding:5px 11px;border-radius:16px;}
    .status-pill.me-found{background:rgba(200,240,74,.15);color:var(--accent);border:1px solid rgba(200,240,74,.3);}
    .status-pill.them-found{background:rgba(124,109,250,.15);color:var(--accent2);border:1px solid rgba(124,109,250,.3);}
    .status-pill.pending{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
    .notes-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
    .notes-ta{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:11px;resize:none;min-height:72px;outline:none;margin-bottom:14px;transition:border-color .15s;}
    .notes-ta:focus{border-color:var(--accent2);}
    .notes-ta::placeholder{color:var(--muted);}
    .modal-actions{display:flex;flex-direction:column;gap:9px;padding:0 20px;}

    /* toast */
    .toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-120%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 20px;border-radius:20px;font-size:12px;font-family:'DM Mono',monospace;z-index:400;transition:transform .3s cubic-bezier(.4,0,.2,1);white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);}

    /* victory */
    .victory{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
    .victory.show{display:flex;}
    .v-emoji{font-size:72px;margin-bottom:20px;}
    .v-title{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:var(--accent);margin-bottom:10px;}
    .v-sub{color:var(--muted);font-size:14px;line-height:1.6;}

    /* spinner */
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}

    #file-input{display:none;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  </style>
</head>
<body>

<!-- ── SETUP SCREEN ─────────────────────────────────────────────────── -->
<div id="screen-setup" class="screen active">
  <div class="setup-logo">People <span>Bingo</span></div>
  <div class="setup-sub">Juego en pareja · Encuentra personas únicas por la calle</div>

  <div class="setup-card">
    <div id="setup-form">
      <div class="setup-label">Tu nombre</div>
      <input class="setup-input" id="inp-name" placeholder="Ej: Alberto" maxlength="20"/>

      <div class="setup-label">Código de sala</div>
      <input class="setup-input" id="inp-room" placeholder="Ej: alberto-maria-2024" maxlength="30"/>

      <button class="btn btn-primary" id="btn-join" onclick="joinRoom()">Entrar a la sala →</button>
      <button class="btn btn-secondary" onclick="genRoom()">Generar código aleatorio</button>
    </div>
    <div id="setup-loading" style="display:none">
      <div class="spinner"></div>
      <p style="text-align:center;color:var(--muted);font-size:13px">Conectando…</p>
    </div>
  </div>
</div>

<!-- ── GAME SCREEN ──────────────────────────────────────────────────── -->
<div id="screen-game" class="screen">
  <header>
    <div class="hdr-left">
      <div class="hdr-room" id="hdr-room"></div>
      <div class="hdr-name" id="hdr-name"></div>
    </div>
    <div class="scores">
      <div class="score-chip me"><span class="dot"></span><span id="score-me">0</span></div>
      <div class="score-chip them"><span class="dot"></span><span id="score-them">0</span></div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('grid',this)">Tablero</button>
    <button class="tab" onclick="switchTab('list',this)">Lista</button>
    <button class="tab" onclick="switchTab('rival',this)">Rival 👀</button>
  </div>

  <!-- MY GRID -->
  <div class="panel active" id="panel-grid">
    <div class="prog-wrap">
      <div class="prog-labels">
        <span>MI PROGRESO</span><span id="prog-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="grid" id="my-grid"></div>
  </div>

  <!-- MY LIST -->
  <div class="panel" id="panel-list">
    <div class="list" id="my-list"></div>
  </div>

  <!-- RIVAL PANEL -->
  <div class="panel" id="panel-rival">
    <div class="prog-wrap">
      <div class="prog-labels">
        <span id="rival-name-label">RIVAL</span><span id="rival-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="rival-fill" style="width:0%;background:var(--accent2)"></div></div>
    </div>
    <div class="grid" id="rival-grid"></div>
  </div>
</div>

<!-- ── MODAL ────────────────────────────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="m-photo"></div>
    <div class="modal-body">
      <div class="modal-num" id="m-num"></div>
      <div class="modal-title" id="m-title"></div>
      <div class="status-row" id="m-status"></div>
      <div class="notes-label">Notas · dónde / cuándo</div>
      <textarea class="notes-ta" id="m-notes" placeholder="Ej: Plaza de las Flores, sábado tarde…"></textarea>
    </div>
    <div class="modal-actions" id="m-actions"></div>
    <div style="height:8px"></div>
  </div>
</div>

<!-- ── VICTORY ──────────────────────────────────────────────────────── -->
<div class="victory" id="victory">
  <div class="v-emoji">🏆</div>
  <div class="v-title">¡BINGO COMPLETO!</div>
  <div class="v-sub" id="victory-sub"></div>
  <button class="btn btn-secondary" style="margin-top:28px;max-width:200px" onclick="document.getElementById('victory').classList.remove('show')">Cerrar</button>
</div>

<!-- ── TOAST ────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*" capture="environment"/>

<script type="module">
// ─── TARGETS (cámbiame con tus 10 personas) ──────────────────────────
const TARGETS = [
  { id:1,  emoji:'🧓', desc:'Abuela haciendo punto sentada' },
  { id:2,  emoji:'👨‍🦲', desc:'Calvo con ojos azules y camiseta roja' },
  { id:3,  emoji:'👱‍♀️', desc:'Rubia con tatuajes y pantalones negros' },
  { id:4,  emoji:'🕶️', desc:'Hombre muy negro con gafas de sol' },
  { id:5,  emoji:'🏖️', desc:'Calvo sin camiseta por la calle y en chanclas negras' },
  { id:6,  emoji:'🎌', desc:'Mujer otaku con mechas rojas y pelo negro' },
  { id:7,  emoji:'⛓️', desc:'Mujer con cadenas extravagantes y pantalones de lino verdes' },
  { id:8,  emoji:'🦸', desc:'Niño pequeño con gafas verdes y camiseta de superhéroes' },
  { id:9,  emoji:'🤖', desc:'Persona con disfraz de robot' },
  { id:10, emoji:'🧔', desc:'Hombre con pelo muy largo, perilla, bigote y bermudas vaqueras' },
];

// ─── WAIT FOR FIREBASE ───────────────────────────────────────────────
function waitFb() {
  return new Promise(res => {
    const check = () => window._fb ? res(window._fb) : setTimeout(check, 50);
    check();
  });
}

// ─── STATE ───────────────────────────────────────────────────────────
let myName = '', rivalName = '', roomId = '', myState = {}, rivalState = {};
let activeId = null;
let fb;

// ─── SETUP ───────────────────────────────────────────────────────────
window.genRoom = () => {
  const words = ['sol','mar','luna','rio','viento','campo','cielo','plaza','bahia','puerto'];
  const a = words[Math.floor(Math.random()*words.length)];
  const b = words[Math.floor(Math.random()*words.length)];
  document.getElementById('inp-room').value = `${a}-${b}-${Math.floor(Math.random()*100)}`;
};

window.joinRoom = async () => {
  const name = document.getElementById('inp-name').value.trim();
  const room = document.getElementById('inp-room').value.trim().toLowerCase().replace(/\s+/g,'-');
  if (!name || !room) { showToast('Rellena tu nombre y la sala'); return; }

  myName = name;
  roomId = room;

  document.getElementById('setup-form').style.display = 'none';
  document.getElementById('setup-loading').style.display = 'block';

  fb = await waitFb();

  // Check Firebase config
  if (document.querySelector('script[type=module]').textContent.includes('PEGA_TU_API_KEY')) {
    document.getElementById('setup-loading').innerHTML = `
      <p style="color:var(--red);text-align:center;font-size:13px;line-height:1.7;padding:20px 0">
        ⚠️ Falta configurar Firebase.<br>Sigue las instrucciones del README.
      </p>`;
    return;
  }

  const { db, ref, get, set, onValue } = fb;

  // register player in room
  const playerRef = ref(db, `rooms/${roomId}/players/${myName}`);
  await set(playerRef, { name: myName, joinedAt: Date.now() });

  // load my state
  const mySnap = await get(ref(db, `rooms/${roomId}/state/${myName}`));
  if (mySnap.exists()) myState = mySnap.val();

  // listen to my state
  onValue(ref(db, `rooms/${roomId}/state/${myName}`), snap => {
    if (snap.exists()) { myState = snap.val(); renderAll(); }
  });

  // listen to players to detect rival
  onValue(ref(db, `rooms/${roomId}/players`), snap => {
    if (!snap.exists()) return;
    const players = snap.val();
    const others = Object.keys(players).filter(n => n !== myName);
    if (others.length > 0) {
      rivalName = others[0];
      document.getElementById('score-them').textContent = `${rivalName.substring(0,8)}: ${countFound(rivalState)}`;
      document.getElementById('rival-name-label').textContent = `PROGRESO DE ${rivalName.toUpperCase()}`;
      // subscribe to rival
      onValue(ref(db, `rooms/${roomId}/state/${rivalName}`), rSnap => {
        if (rSnap.exists()) { rivalState = rSnap.val(); renderAll(); }
      });
    }
  });

  // go to game
  document.getElementById('screen-setup').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  document.getElementById('hdr-room').textContent = `SALA: ${roomId}`;
  document.getElementById('hdr-name').textContent = myName;

  renderAll();
};

// ─── HELPERS ─────────────────────────────────────────────────────────
function getMyItem(id)     { return myState[id]    || { found:false, photo:null, notes:'', date:'' }; }
function getRivalItem(id)  { return rivalState[id]  || { found:false, photo:null, date:'' }; }
function countFound(state) { return TARGETS.filter(t => state[t.id]?.found).length; }

function myFound()    { return countFound(myState); }
function rivalFound() { return countFound(rivalState); }

// ─── RENDER ALL ──────────────────────────────────────────────────────
function renderAll() {
  renderScores();
  renderMyGrid();
  renderMyList();
  renderRivalGrid();
}

function renderScores() {
  const mf = myFound(), rf = rivalFound(), total = TARGETS.length;
  document.getElementById('score-me').textContent   = `${myName.substring(0,8)}: ${mf}/${total}`;
  document.getElementById('score-them').textContent = rivalName
    ? `${rivalName.substring(0,8)}: ${rf}/${total}` : '— esperando rival';
  const pct = Math.round(mf/total*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  const rpct = Math.round(rf/total*100);
  document.getElementById('rival-fill').style.width = rpct+'%';
  document.getElementById('rival-pct').textContent = rpct+'%';
}

function buildCard(target, item, isRival) {
  const card = document.createElement('div');
  let cls = 'card';
  if (item.found) cls += isRival ? ' found-them' : ' found';
  card.className = cls;
  card.onclick = () => !isRival && openModal(target.id);

  const num = document.createElement('div');
  num.className = 'card-num';
  num.textContent = `#${String(target.id).padStart(2,'0')}`;

  let photoEl;
  if (item.photo) {
    photoEl = document.createElement('img');
    photoEl.className = 'card-photo';
    photoEl.src = item.photo;
    photoEl.alt = target.desc;
  } else {
    photoEl = document.createElement('div');
    photoEl.className = 'card-placeholder';
    photoEl.innerHTML = `<span class="em">${target.emoji}</span><span class="lbl">SIN FOTO</span>`;
  }

  const info = document.createElement('div');
  info.className = 'card-info';
  info.innerHTML = `<div class="card-title">${target.desc}</div>`;
  if (item.date) info.innerHTML += `<div class="card-date">${item.date}</div>`;

  if (item.found) {
    const badge = document.createElement('div');
    badge.className = 'found-badge ' + (isRival ? 'them' : 'me');
    badge.textContent = '✓';
    card.appendChild(badge);
  }

  card.appendChild(num);
  card.appendChild(photoEl);
  card.appendChild(info);
  return card;
}

function renderMyGrid() {
  const g = document.getElementById('my-grid');
  g.innerHTML = '';
  TARGETS.forEach(t => g.appendChild(buildCard(t, getMyItem(t.id), false)));
}

function renderMyList() {
  const l = document.getElementById('my-list');
  l.innerHTML = '';
  TARGETS.forEach(t => {
    const item = getMyItem(t.id);
    const row = document.createElement('div');
    row.className = 'list-item' + (item.found ? ' found' : '');
    row.onclick = () => openModal(t.id);
    let thumb = item.photo ? `<img src="${item.photo}" alt=""/>` : t.emoji;
    row.innerHTML = `
      <div class="list-rank">${String(t.id).padStart(2,'0')}</div>
      <div class="list-thumb">${thumb}</div>
      <div class="list-info">
        <div class="list-name">${t.desc}</div>
        <div class="list-meta">${item.found ? (item.date||'Encontrada') : 'Pendiente'}</div>
      </div>
      <div class="list-check">${item.found ? '✓' : ''}</div>`;
    l.appendChild(row);
  });
}

function renderRivalGrid() {
  const g = document.getElementById('rival-grid');
  g.innerHTML = '';
  if (!rivalName) {
    g.innerHTML = '<p style="text-align:center;color:var(--muted);font-size:13px;padding:40px 20px">Esperando a que tu pareja entre con el mismo código de sala…</p>';
    return;
  }
  TARGETS.forEach(t => g.appendChild(buildCard(t, getRivalItem(t.id), true)));
}

// ─── MODAL ───────────────────────────────────────────────────────────
window.openModal = function(id) {
  activeId = id;
  const target = TARGETS.find(t => t.id === id);
  const myItem = getMyItem(id);
  const theirItem = getRivalItem(id);

  document.getElementById('m-num').textContent = `#${String(id).padStart(2,'0')} de ${TARGETS.length}`;
  document.getElementById('m-title').textContent = target.desc;
  document.getElementById('m-notes').value = myItem.notes || '';

  // photo
  const mPhoto = document.getElementById('m-photo');
  if (myItem.photo) {
    mPhoto.innerHTML = `<img class="modal-photo" src="${myItem.photo}" alt="foto mía"/>`;
  } else if (theirItem.photo) {
    mPhoto.innerHTML = `<img class="modal-photo" src="${theirItem.photo}" alt="foto rival" style="filter:brightness(.6)"/>`;
  } else {
    mPhoto.innerHTML = `<div class="modal-photo-empty">${target.emoji}</div>`;
  }

  // status pills
  const statusRow = document.getElementById('m-status');
  statusRow.innerHTML = '';
  if (myItem.found) {
    const p = document.createElement('div');
    p.className = 'status-pill me-found';
    p.textContent = `✓ Tú · ${myItem.date||''}`;
    statusRow.appendChild(p);
  } else {
    const p = document.createElement('div');
    p.className = 'status-pill pending';
    p.textContent = '○ Tú · pendiente';
    statusRow.appendChild(p);
  }
  if (rivalName) {
    const p2 = document.createElement('div');
    p2.className = theirItem.found ? 'status-pill them-found' : 'status-pill pending';
    p2.textContent = theirItem.found ? `✓ ${rivalName} · ${theirItem.date||''}` : `○ ${rivalName} · pendiente`;
    statusRow.appendChild(p2);
  }

  // actions
  const acts = document.getElementById('m-actions');
  acts.innerHTML = '';
  if (!myItem.found) {
    const b1 = document.createElement('button');
    b1.className = 'btn btn-primary';
    b1.innerHTML = '📷 Subir foto y marcar';
    b1.onclick = () => triggerCamera(id);
    acts.appendChild(b1);
    const b2 = document.createElement('button');
    b2.className = 'btn btn-secondary';
    b2.innerHTML = '✓ Marcar sin foto';
    b2.onclick = () => markFound(id, null);
    acts.appendChild(b2);
  } else {
    const b1 = document.createElement('button');
    b1.className = 'btn btn-secondary';
    b1.innerHTML = '📷 Cambiar foto';
    b1.onclick = () => triggerCamera(id);
    acts.appendChild(b1);
    const b2 = document.createElement('button');
    b2.className = 'btn btn-danger';
    b2.innerHTML = '✕ Desmarcar';
    b2.onclick = () => unmark(id);
    acts.appendChild(b2);
  }

  document.getElementById('m-notes').onblur = () => saveNotes(id);
  document.getElementById('overlay').classList.add('open');
};

window.handleOverlay = (e) => {
  if (e.target === document.getElementById('overlay')) closeModal();
};

function closeModal() {
  if (activeId !== null) saveNotes(activeId);
  document.getElementById('overlay').classList.remove('open');
  activeId = null;
}

async function saveNotes(id) {
  const notes = document.getElementById('m-notes').value;
  const { db, ref, update } = fb;
  await update(ref(db, `rooms/${roomId}/state/${myName}/${id}`), { notes });
  myState[id] = { ...getMyItem(id), notes };
}

// ─── CAMERA ──────────────────────────────────────────────────────────
function triggerCamera(id) {
  activeId = id;
  document.getElementById('file-input').click();
}

document.getElementById('file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file || activeId === null) return;
  const reader = new FileReader();
  reader.onload = ev => compress(ev.target.result, 900, 0.72, data => markFound(activeId, data));
  reader.readAsDataURL(file);
  e.target.value = '';
});

function compress(dataUrl, maxW, q, cb) {
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    const r = Math.min(1, maxW / img.width);
    c.width = img.width*r; c.height = img.height*r;
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    cb(c.toDataURL('image/jpeg', q));
  };
  img.src = dataUrl;
}

// ─── MARK / UNMARK ───────────────────────────────────────────────────
async function markFound(id, photo) {
  const date = new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
  const { db, ref, update } = fb;
  const data = { found:true, date, photo: photo||null, notes: getMyItem(id).notes||'' };
  await update(ref(db, `rooms/${roomId}/state/${myName}`), { [id]: data });
  myState[id] = data;
  showToast('¡Encontrada! 🎉');
  closeModal();
  renderAll();
  checkVictory();
}

async function unmark(id) {
  const { db, ref, update } = fb;
  const data = { found:false, photo:null, date:'', notes:'' };
  await update(ref(db, `rooms/${roomId}/state/${myName}`), { [id]: data });
  myState[id] = data;
  showToast('Desmarcada');
  closeModal();
  renderAll();
}

function checkVictory() {
  if (myFound() === TARGETS.length) {
    const rf = rivalFound();
    document.getElementById('victory-sub').innerHTML =
      rf === TARGETS.length
        ? '¡Los dos habéis completado la lista! Empate épico 🤝'
        : `Ganaste tú, ${myName}! ${rivalName ? rivalName + ' lleva ' + rf + '/' + TARGETS.length : ''} 😈`;
    setTimeout(() => document.getElementById('victory').classList.add('show'), 400);
  }
}

// ─── TABS ────────────────────────────────────────────────────────────
window.switchTab = (panel, btn) => {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+panel).classList.add('active');
  btn.classList.add('active');
};

// ─── TOAST ───────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── PWA ─────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
